name: Build and publish GHCR image

on: workflow_dispatch

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: relistennet/relisten-web
  REGISTRY: ghcr.io
  KEEP_GHCR_SHA_VERSIONS: "5"

jobs:
  build_and_publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: |
          short_sha="${GITHUB_SHA::12}"
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "build_date=$build_date" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "package=${IMAGE_NAME#relistennet/}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            org.opencontainers.image.version=sha-${{ steps.meta.outputs.short_sha }}
          push: true

      - name: Verify GHCR package visibility
        env:
          GH_TOKEN: ${{ github.token }}
          ORG: relistennet
          PACKAGE: ${{ steps.meta.outputs.package }}
        run: |
          set -euo pipefail
          visibility="$(gh api "/orgs/$ORG/packages/container/$PACKAGE" --jq '.visibility')"
          if [ "$visibility" != "private" ]; then
            echo "::error::GHCR package $ORG/$PACKAGE visibility is '$visibility', expected 'private'"
            exit 1
          fi

      - name: Prune old GHCR image versions
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GHCR_CLEANUP_TOKEN || github.token }}
          ORG: relistennet
          PACKAGE: ${{ steps.meta.outputs.package }}
          KEEP: ${{ env.KEEP_GHCR_SHA_VERSIONS }}
        run: |
          set -euo pipefail
          ids="$(
            gh api --paginate "/orgs/$ORG/packages/container/$PACKAGE/versions?per_page=100" \
              --jq '.[] | {id, created_at, tags: (.metadata.container.tags // [])}' |
            jq -s --argjson keep "$KEEP" '
              sort_by(.created_at) | reverse
              | map(select(any(.tags[]?; startswith("sha-"))))
              | .[$keep:]
              | map(select((.tags | index("latest")) | not))
              | .[].id
            '
          )"
          if [ -z "$ids" ]; then
            echo "No old GHCR versions to prune for $ORG/$PACKAGE"
            exit 0
          fi
          while read -r id; do
            [ -z "$id" ] && continue
            echo "Deleting old GHCR package version $id for $ORG/$PACKAGE"
            gh api -X DELETE "/orgs/$ORG/packages/container/$PACKAGE/versions/$id"
          done <<< "$ids"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          use-cache: 'true'
          tags: tag:ci
          version: latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.36.2

      - name: Configure relisten3 kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl config use-context relisten3-k3s

      - name: Restart relisten3 deployment
        run: |
          set -euo pipefail
          kubectl -n default rollout restart deployment/relisten-web
          kubectl -n default rollout status deployment/relisten-web --timeout=10m
